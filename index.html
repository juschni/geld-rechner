<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, select {
            padding: 10px;
            margin: 5px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Currency Converter</h1>
    <form id="converter">
        <input type="number" id="amount" placeholder="Amount" required>
        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
            <option value="AUD">AUD</option>
        </select>
        <span>to</span>
        <select id="toCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
            <option value="AUD">AUD</option>
        </select>
        <button type="submit">Convert</button>
    </form>
    <h2 id="result"></h2>

    <script>
        const converter = document.getElementById('converter');
        const result = document.getElementById('result');

        const exchangeRates = {
            USD: { EUR: 0.85, GBP: 0.75, JPY: 110, AUD: 1.3 },
            EUR: { USD: 1.18, GBP: 0.88, JPY: 129, AUD: 1.54 },
            GBP: { USD: 1.33, EUR: 1.14, JPY: 148, AUD: 1.73 },
            JPY: { USD: 0.0091, EUR: 0.0078, GBP: 0.0068, AUD: 0.012 },
            AUD: { USD: 0.77, EUR: 0.65, GBP: 0.58, JPY: 83 }
        };

        converter.addEventListener('submit', (e) => {
            e.preventDefault();
            const amount = document.getElementById('amount').value;
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;

            const rate = exchangeRates[fromCurrency][toCurrency];
            const convertedAmount = (amount * rate).toFixed(2);
            result.textContent = `Converted Amount: ${convertedAmount} ${toCurrency}`;
        });
    </script>
</body>
</html>
